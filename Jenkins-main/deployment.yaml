apiVersion: apps/v1
kind: Deployment
metadata:
  name: even-odd-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: even-odd-app
  template:
    metadata:
      labels:
        app: even-odd-app
    spec:
      containers:
      - name: even-odd-container
        image: even-odd-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
